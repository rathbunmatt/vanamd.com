name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'public/**'
      - 'package.json'
      - 'vite.config.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://vanamd.com \
            --delete \
            --exclude '*.html' \
            --cache-control 'max-age=31536000, immutable'
          aws s3 cp dist/index.html s3://vanamd.com/index.html \
            --content-type 'text/html; charset=utf-8' \
            --cache-control 'max-age=300, s-maxage=86400'
          aws s3 cp dist/robots.txt s3://vanamd.com/robots.txt \
            --content-type 'text/plain; charset=utf-8' \
            --cache-control 'max-age=86400'
          aws s3 cp dist/sitemap.xml s3://vanamd.com/sitemap.xml \
            --content-type 'application/xml; charset=utf-8' \
            --cache-control 'max-age=86400'

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths '/*'
